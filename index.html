<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenAI for Language Learning – Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg,#e8f0fe 0%,#f0f4fa 50%,#e4ecf7 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}

/* ═══ SINGLE PAGE BOOK ═══ */
.book-wrapper{perspective:2500px;transform-style:preserve-3d}

.book{
    position:relative;
    width:600px;
    height:750px;
    border-radius:4px 18px 18px 4px;
    box-shadow:
        inset 4px 0 10px rgba(0,0,0,0.1),
        inset -1px 0 2px rgba(255,255,255,0.9),
        15px 25px 50px rgba(15,23,42,0.15),
        5px 10px 20px rgba(15,23,42,0.1);
    overflow:visible;
    background:#fff;
    transform:rotateX(5deg) rotateY(-5deg);
    transition:transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
    cursor:pointer;
}

.book::before{
    content:'';
    position:absolute;
    inset:0;
    border-radius:4px 18px 18px 4px;
    background:linear-gradient(115deg,transparent 20%,rgba(255,255,255,0.4) 45%,rgba(255,255,255,0.6) 50%,transparent 55%,transparent 100%);
    background-size:200% 100%;
    background-position:100% 0;
    z-index:25;
    pointer-events:none;
    transition:background-position 0.8s ease-out;
    opacity:0
}

.book:hover{
    transform:rotateX(2deg) rotateY(-2deg) translateY(-8px);
    box-shadow:
        inset 4px 0 10px rgba(0,0,0,0.1),
        inset -1px 0 2px rgba(255,255,255,0.9),
        20px 35px 60px rgba(15,23,42,0.2),
        5px 15px 25px rgba(15,23,42,0.15)
}

.book:hover::before{
    background-position:0% 0;
    opacity:1
}

.book.is-open{
    transform:rotateX(0deg) rotateY(0deg) translateY(0) scale(1.05);
    transition:transform 1.2s cubic-bezier(0.645,0.045,0.355,1)
}

/* Spine Crease */
.book-spine-crease{
    position:absolute;top:0;left:0;bottom:0;width:40px;
    background:linear-gradient(to right,rgba(255,255,255,0.5) 0%,rgba(0,0,0,0.06) 15%,transparent 35%,rgba(255,255,255,0.6) 50%,rgba(0,0,0,0.12) 85%,rgba(0,0,0,0.04) 100%);
    border-radius:4px 0 0 4px;z-index:20;pointer-events:none;
    background-image:linear-gradient(to bottom,transparent 10%,rgba(0,0,0,0.05) 10%,rgba(0,0,0,0.05) 11%,transparent 11%,transparent 89%,rgba(0,0,0,0.05) 89%,rgba(0,0,0,0.05) 90%,transparent 90%)
}

/* Texture Overlay */
.book-cover-texture{
    position:absolute;inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
    z-index:15;pointer-events:none;border-radius:4px 18px 18px 4px;mix-blend-mode:multiply
}

/* Inside of the book */
.book-inside{
    position:absolute;inset:0;background:#f8fafc;border-radius:4px 18px 18px 4px;
    padding:40px;display:flex;align-items:center;justify-content:center;
    color:#94a3b8;font-weight:500;font-size:22px;letter-spacing:2px;
    box-shadow:inset 15px 0 30px rgba(0,0,0,0.08);z-index:0;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(59,130,246,0.03) 27px,rgba(59,130,246,0.03) 28px)
}

.page{
    width:100%;height:100%;position:absolute;top:0;left:0;
    border-radius:4px 18px 18px 4px;transform-origin:left center;
    transition:transform 1.2s cubic-bezier(0.645,0.045,0.355,1),box-shadow 1.2s ease;
    transform-style:preserve-3d;z-index:10
}

.book.is-open .page{transform:rotateY(-160deg)}

.page-front,.page-back{
    position:absolute;inset:0;width:100%;height:100%;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:4px 18px 18px 4px;overflow:hidden
}

.page-back{
    transform:rotateY(180deg);background:#e2e8f0;
    box-shadow:inset 15px 0 40px rgba(0,0,0,0.08);border-left:10px solid #cbd5e1
}

/* Fanning Pages */
.flip-page{
    position:absolute;top:0;left:0;width:100%;height:100%;
    background:linear-gradient(to right,#f8fafc,#e2e8f0);
    border-radius:4px 18px 18px 4px;transform-origin:left center;z-index:5;
    box-shadow:inset -2px 0 5px rgba(0,0,0,0.02),4px 0 10px rgba(15,23,42,0.1);
    transition:transform 0.8s cubic-bezier(0.34,1.56,0.64,1),opacity 0.5s
}
.fp-1{z-index:4;width:99.5%;top:0.25%;height:99.5%}
.fp-2{z-index:3;width:99%;top:0.5%;height:99%}
.fp-3{z-index:2;width:98.5%;top:0.75%;height:98.5%}

.book:hover .page{transform:rotateY(-25deg);box-shadow:15px 10px 25px rgba(15,23,42,0.25)}
.book:hover .fp-1{transform:rotateY(-18deg);animation:pageFlutter1 2s infinite alternate ease-in-out}
.book:hover .fp-2{transform:rotateY(-12deg);animation:pageFlutter2 2.2s infinite alternate ease-in-out 0.2s}
.book:hover .fp-3{transform:rotateY(-6deg);animation:pageFlutter3 2.4s infinite alternate ease-in-out 0.4s}

.book.is-open .fp-1{transform:rotateY(-155deg);opacity:0}
.book.is-open .fp-2{transform:rotateY(-150deg);opacity:0}
.book.is-open .fp-3{transform:rotateY(-145deg);opacity:0}

/* ═══ COVER BACKGROUND ═══ */
.cover-bg{width:100%;height:100%;background:linear-gradient(160deg,#f8fbff 0%,#eef4fc 30%,#e6eef8 60%,#dbeafe 100%);position:relative;overflow:hidden}

.cover-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(59,130,246,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.08) 1px,transparent 1px);background-size:40px 40px}

.cover-border{position:absolute;inset:20px 24px 20px 44px;border:1px solid rgba(59,130,246,.2);border-radius:12px 16px 16px 12px;pointer-events:none}
.cover-corner{position:absolute;width:24px;height:24px}
.cc-tl{top:20px;left:44px;border-top:3px solid rgba(59,130,246,.4);border-left:3px solid rgba(59,130,246,.4);border-radius:10px 0 0 0}
.cc-tr{top:20px;right:24px;border-top:3px solid rgba(59,130,246,.4);border-right:3px solid rgba(59,130,246,.4);border-radius:0 10px 0 0}
.cc-bl{bottom:20px;left:44px;border-bottom:3px solid rgba(59,130,246,.4);border-left:3px solid rgba(59,130,246,.4);border-radius:0 0 0 10px}
.cc-br{bottom:20px;right:24px;border-bottom:3px solid rgba(59,130,246,.4);border-right:3px solid rgba(59,130,246,.4);border-radius:0 0 10px 0}

/* Soft orbs */
.orb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(24px)}
.orb1{width:340px;height:340px;background:radial-gradient(circle,rgba(59,130,246,.15) 0%,transparent 70%);top:-8%;right:-10%;animation:orbFloat1 8s ease-in-out infinite}
.orb2{width:300px;height:300px;background:radial-gradient(circle,rgba(139,92,246,.12) 0%,transparent 70%);bottom:-5%;left:5%;animation:orbFloat2 10s ease-in-out infinite}
.orb3{width:260px;height:260px;background:radial-gradient(circle,rgba(6,182,212,.1) 0%,transparent 70%);top:40%;left:50%;transform:translateX(-50%);animation:orbFloat1 12s ease-in-out infinite}

/* Floating particles */
.particle{position:absolute;border-radius:50%;opacity:.8;pointer-events:none}
.float-sym{position:absolute;opacity:.2;pointer-events:none;font-size:20px;filter:drop-shadow(0 4px 6px rgba(59,130,246,0.3))}

/* Scanline */
.scanline{position:absolute;width:100%;height:2px;background:linear-gradient(90deg,transparent,rgba(59,130,246,.25),transparent);animation:scan 7s linear infinite;z-index:5;pointer-events:none;box-shadow:0 0 10px rgba(59,130,246,0.2)}

/* ═══ CENTER CONTENT ═══ */
.cover-center{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:40px 32px 40px 48px}

/* Glass card */
.glass-card{
    padding:36px 32px 28px;border-radius:24px;
    background:rgba(255,255,255,.65);
    border:1px solid rgba(255,255,255,0.9);
    border-top:1px solid rgba(255,255,255,1);
    border-left:1px solid rgba(255,255,255,1);
    backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
    width:100%;max-width:400px;position:relative;
    box-shadow:0 20px 40px rgba(15,23,42,.06),inset 0 0 0 1px rgba(255,255,255,0.4),inset 0 0 20px rgba(255,255,255,0.5)
}
.glass-shimmer-wrap{position:absolute;inset:0;border-radius:24px;overflow:hidden;pointer-events:none}
.glass-shimmer{position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.8) 50%,transparent 60%);animation:shimmer 6s ease-in-out infinite}

/* ═══ ANIMATED DOCUMENT VISUAL ═══ */
.eval-visual{width:100%;margin-bottom:28px}
.eval-doc{background:rgba(255,255,255,.9);border:1px solid rgba(203,213,225,.8);border-radius:12px;overflow:hidden;position:relative;box-shadow:0 8px 30px rgba(59,130,246,.12)}
.eval-doc-header{display:flex;align-items:center;gap:6px;padding:12px 16px;background:#f8fafc;border-bottom:1px solid rgba(203,213,225,.5)}
.eval-hdr-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.typing-text{font-size:11px;font-weight:600;color:rgba(71,85,105,.9);font-family:'Courier New',monospace;margin-left:8px;overflow:hidden;white-space:nowrap;width:0;border-right:2px solid transparent;animation:typing 8s steps(22) infinite,blinkCaret .5s step-end infinite}
.eval-doc-body{padding:18px 18px 14px;position:relative}
.eval-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.eval-row:last-of-type{margin-bottom:0}
.eval-line{height:8px;border-radius:5px;background:rgba(226,232,240,.8);flex-shrink:1}
.eval-tag{font-size:10px;font-family:'Courier New',monospace;font-weight:700;white-space:nowrap;flex-shrink:0;letter-spacing:.5px;animation:tagShow 8s ease-in-out infinite;opacity:0}
.et-good{color:#059669}.et-warn{color:#d97706}.et-bad{color:#dc2626}
.el-good{animation:evalGood 8s ease-in-out infinite}
.el-warn{animation:evalWarn 8s ease-in-out infinite}
.el-bad{animation:evalBad 8s ease-in-out infinite}
.ed-1{animation-delay:.4s}.ed-2{animation-delay:1.1s}.ed-3{animation-delay:1.8s}.ed-4{animation-delay:2.5s}.ed-5{animation-delay:3.2s}
.eval-scanner{position:absolute;left:0;width:100%;height:3px;background:linear-gradient(90deg,transparent,rgba(59,130,246,.8),transparent);box-shadow:0 0 15px rgba(59,130,246,.6);animation:scanDoc 8s ease-in-out infinite;pointer-events:none}

/* ═══ TITLE ═══ */
.cover-title{font-size:46px;font-weight:900;line-height:1.1;color:#0f172a;letter-spacing:-0.5px;margin-bottom:12px;text-shadow:2px 2px 0 rgba(255,255,255,0.9)}
.cover-title span{background:linear-gradient(135deg,#1e40af,#3b82f6,#6366f1,#1e40af);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradShift 6s ease infinite}
.cover-subtitle{font-size:23px;color:#475569;font-weight:500;letter-spacing:.5px;line-height:1.4}
.cover-divider{width:70px;height:4px;margin:24px auto;background:linear-gradient(to right,transparent,rgba(59,130,246,.5),transparent);border-radius:99px}
.cover-badge{display:inline-flex;align-items:center;gap:10px;margin-top:10px;padding:12px 24px;border-radius:99px;background:rgba(255,255,255,.9);border:1px solid rgba(59,130,246,.25);box-shadow:0 4px 15px rgba(15,23,42,0.05)}
.cover-version{font-size:11px;color:#64748b;margin-top:20px;letter-spacing:5px;text-transform:uppercase;font-weight:700}

/* Open button */
.open-btn{
    margin-top:36px;display:inline-flex;align-items:center;gap:12px;
    padding:16px 40px;border-radius:99px;
    background:linear-gradient(135deg,#2563eb,#4f46e5);
    color:#fff;font-size:16px;font-weight:700;letter-spacing:0.5px;
    border:none;cursor:pointer;text-decoration:none;
    box-shadow:0 10px 30px rgba(37,99,235,.35),inset 0 2px 0 rgba(255,255,255,0.25);
    transition:all .3s cubic-bezier(0.4,0,0.2,1);position:relative;z-index:10
}
.open-btn:hover{transform:translateY(-4px);box-shadow:0 15px 35px rgba(37,99,235,.45),inset 0 2px 0 rgba(255,255,255,0.35)}
.open-btn:active{transform:scale(.96) translateY(0);box-shadow:0 4px 15px rgba(37,99,235,.2)}
.btn-arrow{display:inline-block;animation:arrowBounce 1.2s ease-in-out infinite}

/* ═══ CLICK OVERLAY — makes entire book clickable ═══ */
.book-click-overlay{
    position:absolute;
    inset:0;
    z-index:30;
    cursor:pointer;
    border-radius:4px 18px 18px 4px;
    background:transparent;
}

/* ═══ ANIMATIONS ═══ */
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes shimmer{0%,100%{transform:translateX(-30%)}50%{transform:translateX(30%)}}
@keyframes scan{0%{top:-2%}100%{top:102%}}
@keyframes orbFloat1{0%,100%{transform:translate(0,0)}50%{transform:translate(15px,-12px)}}
@keyframes orbFloat2{0%,100%{transform:translate(0,0)}50%{transform:translate(-12px,15px)}}
@keyframes arrowBounce{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}}
@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(6px,-8px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-7px,6px)}}
@keyframes float3{0%,100%{transform:translate(0,0)}50%{transform:translate(5px,8px)}}
@keyframes floatSym1{0%,100%{transform:translate(0,0) rotate(0deg);opacity:.1}50%{transform:translate(8px,-12px) rotate(6deg);opacity:.2}}
@keyframes floatSym2{0%,100%{transform:translate(0,0) rotate(0deg);opacity:.08}50%{transform:translate(-7px,10px) rotate(-6deg);opacity:.18}}
@keyframes typing{0%{width:0}15%,75%{width:22ch}88%,100%{width:0}}
@keyframes blinkCaret{0%,100%{border-right-color:rgba(59,130,246,.6)}50%{border-right-color:transparent}}
@keyframes evalGood{0%,5%{background:rgba(226,232,240,.8);box-shadow:none}14%,72%{background:rgba(16,185,129,.2);box-shadow:0 0 10px rgba(16,185,129,.1)}84%,100%{background:rgba(226,232,240,.8);box-shadow:none}}
@keyframes evalWarn{0%,5%{background:rgba(226,232,240,.8);box-shadow:none}14%,72%{background:rgba(245,158,11,.2);box-shadow:0 0 10px rgba(245,158,11,.1)}84%,100%{background:rgba(226,232,240,.8);box-shadow:none}}
@keyframes evalBad{0%,5%{background:rgba(226,232,240,.8);box-shadow:none}14%,72%{background:rgba(239,68,68,.15);box-shadow:0 0 10px rgba(239,68,68,.1)}84%,100%{background:rgba(226,232,240,.8);box-shadow:none}}
@keyframes tagShow{0%,10%{opacity:0;transform:translateX(-5px)}18%,70%{opacity:1;transform:translateX(0)}82%,100%{opacity:0;transform:translateX(5px)}}
@keyframes scanDoc{0%,3%{top:12px;opacity:0}6%{top:12px;opacity:1}50%{top:calc(100% - 18px);opacity:1}56%,100%{top:calc(100% - 18px);opacity:0}}
@keyframes pageFlutter1{0%{transform:rotateY(-18deg)}100%{transform:rotateY(-21deg)}}
@keyframes pageFlutter2{0%{transform:rotateY(-12deg)}100%{transform:rotateY(-15deg)}}
@keyframes pageFlutter3{0%{transform:rotateY(-6deg)}100%{transform:rotateY(-9deg)}}

/* ═══ RESPONSIVE ═══ */
@media(max-width:640px){
  .book{width:92vw;height:auto;min-height:85vh}
  .cover-title{font-size:36px}
  .cover-center{padding:30px 20px 30px 36px}
  .glass-card{padding:28px 24px 24px}
}
</style>
</head>
<body>

<div class="book-wrapper">
  <div class="book" id="theBook">

    <!-- ═══ FULL-BOOK CLICK OVERLAY ═══ -->
    <div class="book-click-overlay" id="bookClickOverlay"></div>

    <!-- Inside Book Content -->
    <div class="book-inside">
      Opening...
    </div>

    <!-- Hidden pages that fan out on hover -->
    <div class="flip-page fp-1"></div>
    <div class="flip-page fp-2"></div>
    <div class="flip-page fp-3"></div>

    <div class="page">
      <div class="page-front">
        <!-- Physical Book Elements -->
        <div class="book-spine-crease"></div>
        <div class="book-cover-texture"></div>

        <div class="cover-bg">
          <div class="cover-grid"></div>

          <!-- Orbs -->
          <div class="orb orb1"></div>
          <div class="orb orb2"></div>
          <div class="orb orb3"></div>

          <!-- Particles -->
          <div class="particle" style="left:12%;top:12%;width:8px;height:8px;background:#3b82f6;box-shadow:0 0 16px rgba(59,130,246,.6);animation:float1 4s ease-in-out infinite"></div>
          <div class="particle" style="left:82%;top:18%;width:9px;height:9px;background:#8b5cf6;box-shadow:0 0 18px rgba(139,92,246,.6);animation:float2 5.2s ease-in-out infinite"></div>
          <div class="particle" style="left:10%;top:50%;width:6px;height:6px;background:#06b6d4;box-shadow:0 0 14px rgba(6,182,212,.6);animation:float3 6s ease-in-out infinite"></div>
          <div class="particle" style="left:90%;top:55%;width:7px;height:7px;background:#3b82f6;box-shadow:0 0 14px rgba(59,130,246,.6);animation:float1 7s ease-in-out infinite"></div>
          <div class="particle" style="left:18%;top:82%;width:8px;height:8px;background:#7dd3fc;box-shadow:0 0 16px rgba(125,211,252,.6);animation:float2 8s ease-in-out infinite"></div>
          <div class="particle" style="left:78%;top:88%;width:6px;height:6px;background:#8b5cf6;box-shadow:0 0 14px rgba(139,92,246,.6);animation:float3 9s ease-in-out infinite"></div>

          <!-- Floating symbols -->
          <div class="float-sym" style="left:8%;top:15%;animation:floatSym1 7s ease-in-out infinite">🔍</div>
          <div class="float-sym" style="right:8%;top:12%;font-size:16px;animation:floatSym2 9s ease-in-out infinite">🧠</div>
          <div class="float-sym" style="left:7%;bottom:16%;font-size:16px;animation:floatSym2 11s ease-in-out infinite">⚡</div>
          <div class="float-sym" style="right:10%;bottom:14%;animation:floatSym1 8s ease-in-out infinite">💡</div>

          <!-- ═══ CENTER CONTENT ═══ -->
          <div class="cover-center">
            <div class="glass-card">
              <div class="glass-shimmer-wrap"><div class="glass-shimmer"></div></div>

              <!-- ANIMATED DOCUMENT VISUAL -->
              <div class="eval-visual">
                <div class="eval-doc">
                  <div class="eval-doc-header">
                    <span class="eval-hdr-dot" style="background:#ef4444"></span>
                    <span class="eval-hdr-dot" style="background:#f59e0b"></span>
                    <span class="eval-hdr-dot" style="background:#10b981"></span>
                    <span class="typing-text">Evaluating AI output...</span>
                  </div>
                  <div class="eval-doc-body">
                    <div class="eval-row">
                      <div class="eval-line el-good ed-1" style="width:82%"></div>
                      <span class="eval-tag et-good ed-1">✓ Fact</span>
                    </div>
                    <div class="eval-row">
                      <div class="eval-line el-warn ed-2" style="width:65%"></div>
                      <span class="eval-tag et-warn ed-2">⚠ Logic</span>
                    </div>
                    <div class="eval-row">
                      <div class="eval-line el-good ed-3" style="width:76%"></div>
                      <span class="eval-tag et-good ed-3">✓ OK</span>
                    </div>
                    <div class="eval-row">
                      <div class="eval-line el-bad ed-4" style="width:54%"></div>
                      <span class="eval-tag et-bad ed-4">✗ Bias</span>
                    </div>
                    <div class="eval-row">
                      <div class="eval-line el-good ed-5" style="width:70%"></div>
                      <span class="eval-tag et-good ed-5">✓ Tone</span>
                    </div>
                    <div class="eval-scanner"></div>
                  </div>
                </div>
              </div>

              <!-- TITLE -->
              <h1 class="cover-title">GenAI for<br>Language Learning</h1>
              <p class="cover-subtitle">Evaluating AI-generated Content</p>

              <div class="cover-divider"></div>

           
              <p class="cover-version">Student Edition • 2026</p>
            </div><!-- /.glass-card -->

            <span class="open-btn">
              Open <span class="btn-arrow">→</span>
            </span>
          </div><!-- /.cover-center -->
        </div><!-- /.cover-bg -->
      </div><!-- /.page-front -->
      <div class="page-back"></div>
    </div><!-- /.page -->
  </div><!-- /.book -->
</div><!-- /.book-wrapper -->

<script>
(function() {
  const TARGET_URL = 'notes.html';
  const book = document.getElementById('theBook');
  const overlay = document.getElementById('bookClickOverlay');
  let isOpening = false;

  function openBook() {
    if (isOpening) return;
    isOpening = true;

    // Play the flip animation
    book.classList.add('is-open');

    // Navigate after the animation
    setTimeout(function() {
      window.location.href = TARGET_URL;
    }, 900);
  }

  // The overlay sits on top of the entire book, catching all clicks
  overlay.addEventListener('click', openBook);
})();
</script>

</body>
</html>
